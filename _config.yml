# Theme Settings
minimal_mistakes_skin: "air"

# Site Settings
locale: "ko-kr"
title: "lavie-h" # 소문자로 변경하여 감성 추가
title_separator: "|"
name: "기록하는 사람"
description: "Make a note"
url: "https://lavie-h.github.io"
baseurl: ""

# SEO & Analytics
analytics:
  provider: "google-gtag"
  google:
    tracking_id: "G-VJ8HMYCGYK"

# Site Author (사이드바를 안 쓰므로 간소화)
author:
  name: "기록하는 사람"
  location: "Seoul"

# Reading Files
include:
  - .htaccess
  - _pages
exclude:
  - vendor
  - node_modules
  - Gemfile
  - Gemfile.lock

# Conversion
markdown: kramdown
highlighter: rouge
timezone: Asia/Seoul # 오타 수정

# Pagination
paginate: 10
paginate_path: /page:num/

# Plugins
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-feed
  - jekyll-include-cache

# Defaults (핵심 레이아웃 설정)
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      classes: wide
      author_profile: false
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      classes: wide
      author_profile: false