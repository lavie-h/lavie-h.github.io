# 1. 테마 및 플러그인 (가장 중요)
remote_theme: "mmistakes/minimal-mistakes"
minimal_mistakes_skin: "air"

plugins:
  - jekyll-remote-theme
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-feed
  - jekyll-include-cache

# 2. 사이트 설정
locale: "ko-kr"
title: "lavie-h"
name: "기록하는 사람"
description: "Make a note"
url: "https://lavie-h.github.io"
baseurl: ""

# 3. 빌드 속도 향상을 위한 짐 덜어내기 (핵심!)
exclude:
  - docs/          # 샘플 문서 폴더 전체 제외
  - test/          # 테스트 폴더 제외
  - vendor/
  - node_modules/
  - Gemfile
  - Gemfile.lock
  - .sass-cache/
  - .jekyll-cache/

# 4. 기타 설정
timezone: Asia/Seoul
markdown: kramdown
highlighter: rouge

# 5. 레이아웃 기본값
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      classes: wide
      author_profile: false
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      classes: wide
      author_profile: false