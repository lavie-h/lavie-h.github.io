# 1. 테마 및 엔진 설정 (필수!)
remote_theme: "mmistakes/minimal-mistakes"
minimal_mistakes_skin: "air"

# 2. 플러그인 설정 (이게 없으면 빌드 에러가 납니다)
plugins:
  - jekyll-remote-theme
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-feed
  - jekyll-include-cache

# 3. 사이트 정보 (사용자님이 적어주신 내용 반영)
title: "Lavie H"
description: "a quiet archive"
url: "https://lavie-h.github.io"
baseurl: ""
repository: "lavie-h/lavie-h.github.io" # 사용자님의 레포지토리 이름

# 4. 빌드 최적화 (무거운 샘플 파일 무시)
exclude:
  - docs/
  - test/
  - vendor/
  - Gemfile
  - Gemfile.lock

# 5. 시스템 설정
timezone: Asia/Seoul
markdown: kramdown
highlighter: rouge

# 6. 레이아웃 기본값 (사이드바 제거 및 중앙 정렬용)
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      classes: wide
      author_profile: false
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      classes: wide
      author_profile: false