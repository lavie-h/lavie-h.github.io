<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Travel | Lavie H</title>

<link rel="stylesheet" href="/assets/css/style.css">

<style>

.travel-page{
  max-width:1000px;
  margin:0 auto;
  padding:60px 24px 100px;
}

.travel-header{
  margin-bottom:60px;
}

.travel-header h1{
  font-size:64px;
  font-weight:500;
  margin:0;
}

.travel-intro{
  margin-top:12px;
  color:#666;
}

/* 리스트 */

.travel-list{
  border-top:1px solid #ddd;
}

.travel-item{

  display:grid;
  grid-template-columns:220px 1fr;
  gap:30px;

  align-items:center;

  padding:28px 0;

  border-bottom:1px solid #ddd;

  text-decoration:none;
  color:inherit;

  transition:opacity .25s ease;
}

.travel-item:hover{
  opacity:0.7;
}

/* 이미지 */

.travel-thumb img{
  width:100%;
  height:150px;
  object-fit:cover;
  border-radius:4px;
}

/* 텍스트 */

.travel-city{
  font-size:36px;
  margin:0;
  font-weight:500;
}

.travel-meta{
  margin-top:6px;
  font-size:12px;
  letter-spacing:0.08em;
  text-transform:uppercase;
  color:#888;
}

/* 모바일 */

@media (max-width:768px){

.travel-item{
  grid-template-columns:1fr;
  gap:14px;
}

.travel-thumb img{
  height:200px;
}

.travel-city{
  font-size:28px;
}

}

</style>

</head>

<body>

<header class="top-header">

<div class="brand">
<a href="/" class="brand-title">Lavie H</a>
<p class="brand-tagline">a quiet archive</p>
</div>

<nav class="top-nav">
<a href="/">Home</a>
<a href="/about/">About</a>
<a href="/travel/">Travel</a>
</nav>

</header>


<main class="travel-page">

<section class="travel-header">

<h1>Travel</h1>
<p class="travel-intro">도시를 지나며 남겨둔 기록들</p>

</section>


<section class="travel-list">


<a href="/travel/chiangmai.html" class="travel-item">

<div class="travel-thumb">
<img src="/assets/images/travel/chiangmai.jpg" alt="Chiang Mai">
</div>

<div>
<h2 class="travel-city">Chiang Mai</h2>
<p class="travel-meta">Thailand · 2024</p>
</div>

</a>


<a href="/travel/paris.html" class="travel-item">

<div class="travel-thumb">
<img src="/assets/images/travel/paris.jpg" alt="Paris">
</div>

<div>
<h2 class="travel-city">Paris</h2>
<p class="travel-meta">France · 2023</p>
</div>

</a>


<a href="/travel/tokyo.html" class="travel-item">

<div class="travel-thumb">
<img src="/assets/images/travel/tokyo.jpg" alt="Tokyo">
</div>

<div>
<h2 class="travel-city">Tokyo</h2>
<p class="travel-meta">Japan · 2024</p>
</div>

</a>


<a href="/travel/bangkok.html" class="travel-item">

<div class="travel-thumb">
<img src="/assets/images/travel/bangkok.jpg" alt="Bangkok">
</div>

<div>
<h2 class="travel-city">Bangkok</h2>
<p class="travel-meta">Thailand · 2022</p>
</div>

</a>


</section>

</main>

</body>
</html>
