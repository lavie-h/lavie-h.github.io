<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Travel | Lavie H</title>

<link rel="stylesheet" href="/assets/css/style.css">

<style>

/* ===== Travel Page Layout ===== */

.travel-page{
  max-width:1100px;
  margin:0 auto;
  padding:60px 24px 100px;
}

/* hero */

.travel-hero{
  margin-bottom:60px;
}

.travel-eyebrow{
  font-size:12px;
  letter-spacing:0.2em;
  text-transform:uppercase;
  color:#888;
  margin-bottom:10px;
}

.travel-hero h1{
  font-size:72px;
  font-weight:500;
  letter-spacing:-0.03em;
  margin:0;
}

.travel-intro{
  margin-top:18px;
  max-width:520px;
  font-size:16px;
  line-height:1.8;
  color:#666;
}

/* ===== Travel List ===== */

.travel-list{
  border-top:1px solid #ddd;
}

.travel-entry{

  display:grid;
  grid-template-columns:1.2fr 1fr;
  gap:30px;

  padding:30px 0;

  border-bottom:1px solid #ddd;

  text-decoration:none;
  color:inherit;

  transition:opacity .25s ease;
}

.travel-entry:hover{
  opacity:0.65;
}

/* left */

.travel-entry-main h2{
  font-size:42px;
  font-weight:500;
  margin:0;
}

.travel-meta{
  margin-top:8px;
  font-size:12px;
  letter-spacing:0.1em;
  text-transform:uppercase;
  color:#888;
}

/* right */

.travel-desc{
  font-size:15px;
  line-height:1.8;
  color:#555;
  max-width:360px;
  justify-self:end;
}

/* ===== Mobile ===== */

@media (max-width:768px){

.travel-page{
  padding:30px 20px 60px;
}

.travel-hero h1{
  font-size:42px;
}

.travel-entry{
  grid-template-columns:1fr;
  gap:12px;
}

.travel-desc{
  justify-self:start;
  max-width:none;
}

.travel-entry-main h2{
  font-size:28px;
}

}

</style>

</head>

<body>

<header class="top-header">

<div class="brand">
<a href="/" class="brand-title">Lavie H</a>
<p class="brand-tagline">a quiet archive</p>
</div>

<nav class="top-nav">
<a href="/">Home</a>
<a href="/about/">About</a>
<a href="/travel/">Travel</a>
</nav>

</header>


<main class="travel-page">

<section class="travel-hero">

<p class="travel-eyebrow">Archive</p>
<h1>Travel</h1>

<p class="travel-intro">
도시를 지나며 남겨둔 장면과 감정들.
</p>

</section>


<section class="travel-list">

<a href="/travel/chiangmai.html" class="travel-entry">

<div class="travel-entry-main">
<h2>Chiang Mai</h2>
<p class="travel-meta">Thailand · 2024</p>
</div>

<p class="travel-desc">
old city의 느린 공기와 저녁 시장의 온도.
</p>

</a>


<a href="/travel/paris.html" class="travel-entry">

<div class="travel-entry-main">
<h2>Paris</h2>
<p class="travel-meta">France · 2023</p>
</div>

<p class="travel-desc">
걷는 시간만으로도 충분했던 거리와 빛.
</p>

</a>


<a href="/travel/tokyo.html" class="travel-entry">

<div class="travel-entry-main">
<h2>Tokyo</h2>
<p class="travel-meta">Japan · 2024</p>
</div>

<p class="travel-desc">
정돈된 리듬 속에서 발견한 작고 선명한 장면들.
</p>

</a>


<a href="/travel/bangkok.html" class="travel-entry">

<div class="travel-entry-main">
<h2>Bangkok</h2>
<p class="travel-meta">Thailand · 2022</p>
</div>

<p class="travel-desc">
습한 공기와 강한 색이 뒤섞인 밤의 도시.
</p>

</a>


</section>

</main>

</body>
</html>
