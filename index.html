---
layout: archive
---

<div style="margin-top: 50px;">
{% assign postsByYear = site.posts | group_by_exp: "post", "post.date | date: '%Y'" %}
{% for year in postsByYear %}
  <section id="{{ year.name }}">
    <h2 class="archive__subtitle">{{ year.name }}</h2>
    <div class="entries-list">
      {% for post in year.items %}
      <article class="archive__item" style="margin-bottom: 35px;">
        <span style="font-size: 0.75em; color: #bbb; display: block; margin-bottom: 8px; letter-spacing: 0.05em;">
          {{ post.date | date: "%Y. %m. %d" }}
        </span>
        <h3 class="archive__item-title" style="font-size: 1.05em; font-weight: 400; margin: 0;">
          <a href="{{ post.url | relative_url }}">{{ post.title }}</a>
        </h3>
      </article>
      {% endfor %}
    </div>
  </section>
{% endfor %}
</div>
